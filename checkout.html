<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procesar Compra - Pickup Express</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <div class="logo-p me-2">P</div>
        <strong>Pickup Express</strong>
      </a>

      <div class="ms-auto d-flex align-items-center text-muted small">
        <a href="index.html" class="nav-link px-2 text-muted">Menu</a>
        <a href="seguimiento.html" class="nav-link px-2 text-muted">Seguir Pedido</a>
        <a href="personal.html" class="nav-link px-2 text-muted">Admin</a>
        <a href="carrito.html" class="position-relative ms-2 text-dark" title="Carrito">
          <i class="bi bi-cart3 fs-5"></i>
          <span id="nav-counter" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.6rem;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container checkout-container">
    <h2 class="fw-bold mb-5">Procesar Compra</h2>

    <div class="row g-4">
      <div class="col-lg-7">
        <section class="card card-custom p-4">
          <h3 class="h5 fw-bold mb-4">Informacion del Cliente</h3>

          <form id="formCheckout" class="needs-validation" novalidate>
            <label for="checkoutNombre" class="form-label"><i class="bi bi-person"></i> Nombre Completo</label>
            <input id="checkoutNombre" name="nombre" type="text" class="form-control" placeholder="Tu nombre completo" required>
            <div class="invalid-feedback">Ingresa tu nombre.</div>

            <label for="checkoutTelefono" class="form-label"><i class="bi bi-telephone"></i> Telefono</label>
            <input id="checkoutTelefono" name="telefono" type="tel" class="form-control" placeholder="+52 000 000 0000" required>
            <div class="invalid-feedback">Ingresa tu telefono.</div>

            <label for="checkoutHora" class="form-label"><i class="bi bi-clock"></i> Hora de Recoleccion</label>
            <select id="checkoutHora" name="hora" class="form-select" required>
              <option value="" selected disabled>Selecciona una hora</option>
              <option>12:00 PM</option>
              <option>01:00 PM</option>
              <option>02:00 PM</option>
              <option>03:00 PM</option>
              <option>04:00 PM</option>
            </select>
            <div class="invalid-feedback">Selecciona una hora.</div>
            <div class="warning-text"><i class="bi bi-exclamation-triangle-fill"></i> Asegurate de llegar a la hora seleccionada</div>

            <label for="checkoutNotas" class="form-label"><i class="bi bi-chat-left-text"></i> Notas</label>
            <textarea id="checkoutNotas" name="notas" class="form-control" rows="3" placeholder="Opcional"></textarea>

            <button id="btnConfirmarPedido" type="submit" class="btn btn-naranja w-100 rounded-3 fw-bold py-3 mt-4">
              <i class="bi bi-check2-circle me-1"></i>
              Confirmar Pedido
            </button>
          </form>

          <div id="checkoutMensaje" class="mt-3"></div>
        </section>
      </div>

      <div class="col-lg-5">
        <section class="card card-custom p-4">
          <h3 class="h5 fw-bold mb-4">Resumen del Pedido</h3>
          <div id="resumen-items-lista"></div>

          <hr class="my-4">

          <div class="d-flex justify-content-between align-items-center">
            <span class="h5 fw-bold mb-0">Total</span>
            <span id="checkout-total" class="h4 texto-naranja">$0.00</span>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="logica.js"></script>
</body>
</html>

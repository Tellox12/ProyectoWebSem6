<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguir Pedido - Pickup Express</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>

<body class="bg-light">

  <header class="bg-white shadow-sm py-3">
    <div class="container d-flex justify-content-between align-items-center">

      <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none text-dark">
        <div class="logo-p">P</div>
        <h1 class="h4 mb-0 fw-bold">Pickup Express</h1>
      </a>

      <nav class="d-flex gap-4 align-items-center">
        <a href="index.html" class="text-decoration-none text-dark">Menú</a>
        <a href="seguimiento.html" class="text-decoration-none text-secondary">Seguir Pedido</a>

        <a href="carrito.html" class="text-decoration-none btn btn-light position-relative border-0 bg-transparent fs-5">
          <i class="bi bi-cart3"></i>
          <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
            0
          </span>
        </a>
      </nav>

    </div>
  </header>

  <main class="contenedor-seguimiento">
    <section class="caja-seguimiento">

      <h2 class="titulo-seguimiento">Seguir mi Pedido</h2>

      <div class="card card-seguimiento">
        <label for="numeroPedido" class="form-label fw-semibold text-secondary">
          Número de Pedido
        </label>

        <div class="d-flex gap-3">
          <input
            type="text"
            id="numeroPedido"
            class="form-control input-seguimiento"
            placeholder="Ej: ORD-ABC123"
          >

          <button class="btn btn-naranja btn-buscar-pedido" onclick="buscarPedido()">
            <i class="bi bi-search me-2"></i>
            Buscar
          </button>
        </div>
      </div>

      <div id="resultadoPedido" class="mt-4"></div>

    </section>
  </main>

  <script src="logica.js"></script>

</body>
</html>

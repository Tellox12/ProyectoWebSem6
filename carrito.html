<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Carrito - Pickup Express</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <div class="logo-p me-2">P</div>
        <strong>Pickup Express</strong>
      </a>

      <div class="ms-auto d-flex align-items-center">
        <a href="index.html" class="nav-link px-3 text-muted">Menu</a>
        <a href="seguimiento.html" class="nav-link px-3 text-muted">Seguir Pedido</a>
        <a href="personal.html" class="nav-link px-3 text-muted">Admin</a>
        <a href="carrito.html" class="position-relative ms-3 text-dark" title="Carrito">
          <i class="bi bi-cart3 fs-4"></i>
          <span id="nav-counter" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.6rem;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container cart-container">
    <h2 class="fw-bold mb-4">Tu Carrito</h2>

    <div id="contenedor-items"></div>

    <section class="card cart-card p-4 mt-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold text-secondary">Subtotal</span>
        <span id="cart-subtotal" class="fw-semibold">$0.00</span>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="h5 fw-bold mb-0">Total</span>
        <span id="total-final" class="h4 fw-bold texto-naranja">$0.00</span>
      </div>

      <div class="d-flex flex-column flex-sm-row gap-2">
        <button id="btn-vaciar-carrito" type="button" class="btn btn-outline-danger rounded-3 flex-sm-fill">
          <i class="bi bi-trash3 me-1"></i>
          Vaciar carrito
        </button>
        <a id="btn-checkout" href="checkout.html" class="btn btn-naranja rounded-3 text-center text-decoration-none flex-sm-fill">
          <i class="bi bi-credit-card me-1"></i>
          Procesar compra
        </a>
      </div>
    </section>
  </main>

  <script src="logica.js"></script>
</body>
</html>

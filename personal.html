<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Personal - Pickup Express</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>

<body class="bg-light">

  <header class="bg-white border-bottom py-3">
    <div class="container d-flex justify-content-between align-items-center">

      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-box-seam texto-naranja fs-4"></i>
        <h1 class="h5 mb-0 fw-bold">Panel de Personal</h1>
      </div>

      <a href="index.html" class="text-decoration-none text-secondary">
        <i class="bi bi-box-arrow-right me-1"></i>
        Salir
      </a>

    </div>
  </header>

  <nav class="bg-white border-bottom">
    <div class="container d-flex gap-4">

      <button class="btn btn-tab-personal active" onclick="mostrarSeccionPersonal('pedidos')">
        <i class="bi bi-bag me-1"></i>
        Pedidos
      </button>

      <button class="btn btn-tab-personal" onclick="mostrarSeccionPersonal('productos')">
        <i class="bi bi-box-seam me-1"></i>
        Productos
      </button>

    </div>
  </nav>

  <main class="container py-4">

    <section id="seccion-pedidos">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold">Gestión de Pedidos</h2>

        <div class="d-flex gap-2">
          <button class="btn btn-naranja rounded-3">Todos (0)</button>
          <button class="btn btn-outline-secondary bg-white rounded-3">Pendientes (0)</button>
          <button class="btn btn-outline-secondary bg-white rounded-3">Preparando (0)</button>
          <button class="btn btn-outline-secondary bg-white rounded-3">Listos (0)</button>
        </div>
      </div>

      <div class="card border-0 shadow-sm text-center p-5">
        <i class="bi bi-box-seam text-secondary" style="font-size: 55px;"></i>
        <p class="text-muted mt-3 mb-0">No hay pedidos</p>
      </div>
    </section>

    <section id="seccion-productos" class="d-none">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold">Gestión de Productos</h2>

        <button class="btn btn-naranja fw-bold rounded-3">
          <i class="bi bi-plus-lg me-1"></i>
          Nuevo Producto
        </button>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-4">
        <button class="btn btn-naranja rounded-3">Todos (4)</button>
        <button class="btn btn-outline-secondary bg-white rounded-3">Bebidas (4)</button>
        <button class="btn btn-outline-secondary bg-white rounded-3">Comidas (0)</button>
        <button class="btn btn-outline-secondary bg-white rounded-3">Postres (0)</button>
        <button class="btn btn-outline-secondary bg-white rounded-3">Snacks (0)</button>
      </div>

      <div class="row g-4" id="listaProductosPersonal"></div>

    </section>

  </main>

  <script src="logica.js"></script>

</body>
</html>

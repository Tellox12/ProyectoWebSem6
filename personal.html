<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador - Pickup Express</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>

<body class="bg-light">

  <header class="bg-white border-bottom py-3">
    <div class="container d-flex justify-content-between align-items-center">

      <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none text-dark">
        <i class="bi bi-shield-lock texto-naranja fs-4"></i>
        <h1 class="h5 mb-0 fw-bold">Panel de Administrador</h1>
      </a>

      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="text-decoration-none text-secondary">
          <i class="bi bi-shop me-1"></i>
          Menu
        </a>
        <button id="btnAdminLogout" type="button" class="btn btn-outline-secondary btn-sm d-none">
          <i class="bi bi-box-arrow-right me-1"></i>
          Cerrar sesion
        </button>
      </div>

    </div>
  </header>

  <main class="container py-4">
    <section id="admin-login" class="admin-auth">
      <div class="card admin-login-card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="h4 fw-bold mb-4">Acceso administrador</h2>

          <form id="formAdminLogin">
            <label for="adminEmail" class="form-label"><i class="bi bi-envelope"></i> Correo</label>
            <input id="adminEmail" type="email" class="form-control" placeholder="admin@pickupexpress.com" required>

            <label for="adminPassword" class="form-label"><i class="bi bi-key"></i> Contrasena</label>
            <input id="adminPassword" type="password" class="form-control" placeholder="admin123" required>

            <button type="submit" class="btn btn-naranja w-100 rounded-3 fw-bold mt-4">
              <i class="bi bi-unlock me-1"></i>
              Entrar
            </button>
          </form>

          <div id="loginError" class="alert alert-danger d-none mt-3 mb-0"></div>
        </div>
      </div>
    </section>

    <section id="admin-panel" class="d-none">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h2 class="h4 fw-bold mb-1">Administracion</h2>
          <p class="text-muted mb-0">Pedidos y productos de Pickup Express</p>
        </div>

        <button id="btnNuevoProducto" type="button" class="btn btn-naranja rounded-3">
          <i class="bi bi-plus-lg me-1"></i>
          Nuevo Producto
        </button>
      </div>

      <nav class="bg-white border rounded-3 mb-4 admin-tabs">
        <div class="d-flex gap-4">
          <button type="button" class="btn btn-tab-personal active" data-admin-tab="pedidos">
            <i class="bi bi-bag me-1"></i>
            Pedidos
          </button>

          <button type="button" class="btn btn-tab-personal" data-admin-tab="productos">
            <i class="bi bi-box-seam me-1"></i>
            Productos
          </button>
        </div>
      </nav>

      <section id="seccion-pedidos">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <h3 class="h4 fw-bold mb-0">Gestion de Pedidos</h3>

          <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-naranja rounded-3" data-order-filter="todos">Todos (<span data-order-count="todos">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-order-filter="pendiente">Pendientes (<span data-order-count="pendiente">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-order-filter="preparando">Preparando (<span data-order-count="preparando">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-order-filter="listo">Listos (<span data-order-count="listo">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-order-filter="entregado">Entregados (<span data-order-count="entregado">0</span>)</button>
          </div>
        </div>

        <div id="listaPedidosAdmin"></div>
      </section>

      <section id="seccion-productos" class="d-none">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <h3 class="h4 fw-bold mb-0">Gestion de Productos</h3>

          <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-naranja rounded-3" data-product-filter="todos">Todos (<span data-product-count="todos">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-product-filter="bebidas">Bebidas (<span data-product-count="bebidas">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-product-filter="comidas">Comidas (<span data-product-count="comidas">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-product-filter="postres">Postres (<span data-product-count="postres">0</span>)</button>
            <button type="button" class="btn btn-outline-secondary bg-white rounded-3" data-product-filter="snacks">Snacks (<span data-product-count="snacks">0</span>)</button>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-12 col-lg-4">
            <section class="card admin-card border-0 shadow-sm">
              <div class="card-body">
                <h4 id="tituloFormularioProducto" class="h5 fw-bold mb-3">Nuevo producto</h4>

                <form id="formProducto" class="needs-validation" novalidate>
                  <input type="hidden" id="productoId">

                  <label for="productoNombre" class="form-label">Nombre</label>
                  <input id="productoNombre" type="text" class="form-control" required>
                  <div class="invalid-feedback">Escribe el nombre.</div>

                  <label for="productoCategoria" class="form-label">Categoria</label>
                  <select id="productoCategoria" class="form-select" required>
                    <option value="bebidas">Bebidas</option>
                    <option value="comidas">Comidas</option>
                    <option value="postres">Postres</option>
                    <option value="snacks">Snacks</option>
                  </select>

                  <label for="productoPrecio" class="form-label">Precio</label>
                  <input id="productoPrecio" type="number" class="form-control" min="0" step="0.01" required>
                  <div class="invalid-feedback">Ingresa un precio valido.</div>

                  <label for="productoImagen" class="form-label">Imagen</label>
                  <input id="productoImagen" type="text" class="form-control" placeholder="img/cafe.jpg">

                  <label for="productoDescripcion" class="form-label">Descripcion</label>
                  <textarea id="productoDescripcion" class="form-control" rows="3" required></textarea>
                  <div class="invalid-feedback">Escribe una descripcion.</div>

                  <div class="form-check mt-3">
                    <input id="productoActivo" class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label" for="productoActivo">Visible en menu</label>
                  </div>

                  <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-naranja flex-fill">
                      <i class="bi bi-save me-1"></i>
                      Guardar
                    </button>
                    <button id="btnLimpiarProducto" type="button" class="btn btn-outline-secondary">
                      Limpiar
                    </button>
                  </div>
                </form>
              </div>
            </section>
          </div>

          <div class="col-12 col-lg-8">
            <div class="row g-4" id="listaProductosPersonal"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="logica.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickup Express</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-light">

  <header class="bg-white shadow-sm py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="d-flex align-items-center gap-2 text-decoration-none text-dark">
        <div class="logo-p">P</div>
        <h1 class="h4 mb-0 fw-bold">Pickup Express</h1>
      </a>

      <nav class="d-flex gap-3 align-items-center">
        <a href="#menu" class="text-decoration-none text-dark">Menu</a>
        <a href="seguimiento.html" class="text-decoration-none text-secondary">Seguir Pedido</a>
        <a href="personal.html" class="text-decoration-none text-secondary">Admin</a>

        <a href="carrito.html" class="text-decoration-none btn btn-light position-relative border-0 bg-transparent fs-5" title="Carrito">
          <i class="bi bi-cart3"></i>
          <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
        </a>
      </nav>
    </div>
  </header>

  <section id="inicio" class="fondo-naranja text-white py-5 mb-4">
    <div class="container">
      <h2 class="display-5 fw-bold">Nuestro Menu</h2>
      <p class="lead mb-0">Selecciona tus productos favoritos y recogelos cuando quieras</p>
    </div>
  </section>

  <section id="menu" class="container mb-5">
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button type="button" class="btn btn-naranja rounded-pill px-4 btn-filtro" data-categoria="todos">Todos</button>
      <button type="button" class="btn btn-outline-secondary bg-white rounded-pill px-4 btn-filtro" data-categoria="bebidas">Bebidas</button>
      <button type="button" class="btn btn-outline-secondary bg-white rounded-pill px-4 btn-filtro" data-categoria="comidas">Comidas</button>
      <button type="button" class="btn btn-outline-secondary bg-white rounded-pill px-4 btn-filtro" data-categoria="postres">Postres</button>
      <button type="button" class="btn btn-outline-secondary bg-white rounded-pill px-4 btn-filtro" data-categoria="snacks">Snacks</button>
    </div>

    <div class="row g-4" id="listaProductosMenu"></div>
  </section>

  <script src="logica.js"></script>
</body>
</html>
